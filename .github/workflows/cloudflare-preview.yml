# Deploy PR previews to Cloudflare Pages
name: Deploy Cloudflare Pages Preview

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

# Allow only one concurrent deployment per PR
concurrency:
  group: cf-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.162.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          TZ: Europe/France
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://test.hot-coffee.dev/"
      - name: Deploy to Cloudflare Pages
        id: cf-deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy public \
            --project-name=dev-blog \
            --branch="${{ github.head_ref }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.pull_request.title }}" 2>&1 | tee /tmp/wrangler-output.txt

          # Extract the deployment URL from wrangler output (format: https://<hash>.<project>.pages.dev)
          DEPLOY_URL=$(grep -oP 'https://[a-z0-9]+\.([a-z0-9-]+)\.pages\.dev' /tmp/wrangler-output.txt | head -1) || true
          echo "deploy-url=${DEPLOY_URL}" >> "${GITHUB_OUTPUT}"

      - name: Comment deployment URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DEPLOY_URL="${{ steps.cf-deploy.outputs.deploy-url }}"
          if [ -z "${DEPLOY_URL}" ]; then
            DEPLOY_URL="https://test.hot-coffee.dev"
          fi
          gh pr comment "${PR_NUMBER}" \
            --body "🚀 Preview deployed to [${DEPLOY_URL}](${DEPLOY_URL})"
