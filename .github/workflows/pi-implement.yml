name: Pi - Implement from Issue Comment

on:
  issue_comment:
    types: [created]

concurrency:
  group: "pi-implement-${{ github.event.issue.number }}"
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: |
      github.event.comment.body &&
      contains(github.event.comment.body, '/implement')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project dependencies
        run: npm ci || true

      - name: Install pi coding agent
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Install SOPS
        run: |
          curl -sLO https://github.com/getsops/sops/releases/download/v3.12.1/sops-v3.12.1.linux.amd64
          chmod +x sops-v3.12.1.linux.amd64
          sudo mv sops-v3.12.1.linux.amd64 /usr/local/bin/sops
          sops --version

      - name: Run pi implementation
        env:
          PI_PROVIDER: ${{ vars.PI_PROVIDER }}
          PI_MODEL: ${{ vars.PI_MODEL }}
          PI_THINKING: ${{ vars.PI_THINKING }}
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/scripts/pi-implement.mjs

      - name: Comment on failure
        if: failure()
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "⚠️ Pi implementation failed. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
