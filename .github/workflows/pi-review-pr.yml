name: Pi - Review PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: "pi-review-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project dependencies
        run: npm ci || true

      - name: Install pi coding agent
        run: npm install --no-save @earendil-works/pi-coding-agent

      - name: Install SOPS
        run: |
          curl -sLO https://github.com/getsops/sops/releases/download/v3.12.1/sops-v3.12.1.linux.amd64
          chmod +x sops-v3.12.1.linux.amd64
          sudo mv sops-v3.12.1.linux.amd64 /usr/local/bin/sops
          sops --version

      - name: Run pi review
        env:
          PI_PROVIDER: ${{ vars.PI_PROVIDER }}
          PI_MODEL: ${{ vars.PI_MODEL }}
          PI_THINKING: ${{ vars.PI_THINKING }}
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: node .github/scripts/pi-review-pr.mjs

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "⚠️ Pi PR review failed. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
