baseURL: https://blog.hot-coffee.dev/
locale: fr-FR
title: Hot coffee - devBlog ☕
theme: PaperMod
copyright: Ivan Béthus (CC BY 4.0) - 2024-2025
enableRobotsTXT: true
defaultContentLanguage: fr
ignoreLogs:
  - 'warning-partial-superfluous-prefix'
minify:
  disableXML: true
  minifyOutput: true
languages:
  en:
    disabled: false
    contentDir: content/en
    locale: en-US
    languageDirection: ""
    label: English
    weight: 2
    taxonomies:
      category: categories
      tag: tags    
    menu:
      main:
        - name: Blog
          url: /blog
          weight: 1
        - name: Search
          url: /search
          weight: 2
    params:
      subtitle: "A passionate developer sharing knowledge, tips, and insights about **Java**, **DevOps**, and **software engineering** — one cup of coffee at a time. ☕"
      buttons:
      - name: Blog
        url: "blog"
      - name: "Who am I?"
        url: "https://github.com/ibethus"
  fr:
    disabled: false
    contentDir: content/fr
    locale: fr-FR
    languageDirection: ""
    label: Français
    weight: 1
    taxonomies:
      category: categories
      tag: tags    
    menu:
      main:
        - name: Blog
          url: blog
          weight: 1
        - name: Recherche
          url: search
          weight: 2
    params:
      subtitle: "Un développeur passionné partageant connaissances, astuces et réflexions sur **Java**, **DevOps** et le **développement logiciel** — un café à la fois. ☕"
      buttons:
      - name: Blog
        url: "blog"
      - name: Qui suis-je ?
        url: "https://github.com/ibethus"
markup:
  goldmark:
    renderer:
        unsafe: true
  highlight:
    #anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: monokai
taxonomies:
  genre: genres
  tag: tags
params: 
  keywords: [java, programming, software-development, devops, coding, tech-blog, development-tools, software-engineering, backend-development, developer-tips]
  ShowShareButtons: true
  hideUntranslated: true
  generateSocialCard: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  author: Ivan Béthus
  assets:
    favicon: /favicon.png
    disableHLJS: true
  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false
  label:
    text: Hot coffee - devBlog ☕
  profileMode:
    enabled: true    
  socialIcons: 
    - name: github
      url: "https://github.com/ibethus?tab=repositories/"
    - name: linkedin
      url: "https://www.linkedin.com/in/ivan-b%C3%A9thus-570067b2/"
    - name: dev
      url: "https://dev.to/ibethus"
outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
