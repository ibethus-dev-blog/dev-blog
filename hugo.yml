baseURL: https://blog.hot-coffee.dev/
languageCode: fr-FR
title: Code, Coffee, Repeat ☕
theme: PaperMod
copyright: Ivan Béthus (CC BY 4.0) - 2024-2025
enableRobotsTXT: true
defaultContentLanguage: fr
minify:
  disableXML: true
  minifyOutput: true
languages:
  en:
    disabled: false
    contentDir: content/en
    languageCode: en-US
    languageDirection: ""
    languageName: English
    weight: 2
    taxonomies:
      category: categories
      tag: tags    
    menu:
      main:
        - name: Blog
          url: /blog
          weight: 1
        - name: Search
          url: /search
          weight: 2
    params:
      subtitle: "Just another dev blog."
      buttons:
      - name: Blog
        url: "blog"
      - name: "Who am I?"
        url: "https://github.com/ibethus"
  fr:
    disabled: false
    contentDir: content/fr
    languageCode: fr-FR
    languageDirection: ""
    languageName: Français
    weight: 1
    taxonomies:
      category: categories
      tag: tags    
    menu:
      main:
        - name: Blog
          url: blog
          weight: 1
        - name: Recherche
          url: search
          weight: 2
    params:
      subtitle: "Juste un blog de dev."
      buttons:
      - name: Blog
        url: "blog"
      - name: Qui suis-je ?
        url: "https://github.com/ibethus"
markup:
  goldmark:
    renderer:
        unsafe: true
  highlight:
    #anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: monokai
taxonomies:
  genre: genres
  tag: tags
params:
  funny:
    enabled: true
    quotes:
      - "99 little bugs in the code, 99 little bugs. Take one down, patch it around... 117 little bugs in the code! 🐛"
      - "I ❤️ writing code that only I can understand… said no one ever."
      - "Why do Java developers wear glasses? Because they can't C#! 🥁"
      - "It's not a bug — it's an undocumented feature! ✨"
      - "There are only 10 types of people in the world: those who understand binary, and those who don't."
      - "I'd tell you a UDP joke, but you might not get it. 📡"
      - "CSS: The only language where 'center' is a suggestion, not a rule."
      - "Real programmers count from 0. 🧮"
      - "Coffee + Code = ✨💻☕✨"
      - "Hire a developer who writes clean code and doesn't use Comic Sans. Deal?"
  keywords: [java, programming, software-development, devops, coding, tech-blog, development-tools, software-engineering, backend-development, developer-tips]
  ShowShareButtons: true
  hideUntranslated: true
  generateSocialCard: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  author: Ivan Béthus
  assets:
    favicon: /favicon.png
    disableHLJS: true
  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false
  label:
    text: Code, Coffee, Repeat ☕
  profileMode:
    enabled: true    
  socialIcons: 
    - name: github
      url: "https://github.com/ibethus?tab=repositories/"
    - name: linkedin
      url: "https://www.linkedin.com/in/ivan-b%C3%A9thus-570067b2/"
    - name: dev
      url: "https://dev.to/ibethus"
outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
